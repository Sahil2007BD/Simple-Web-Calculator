<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img id="logo" src="sahil_img.jpg" alt="Logo">
    <div id="text-holder">Calculator made by Sahil.</div>
</header>

<div class="container">

    <div class="calculator">

        <div class="history" id="history"></div>

        <input type="text" id="display" placeholder="0" disabled>

        <div class="buttons">

            <button class="operator">C</button>
            <button class="operator">%</button>
            <button class="operator">√</button>
            <button class="operator">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <button>0</button>
            <button>.</button>
            <button class="operator">^</button>
            <button class="equal">=</button>

        </div>

    </div>

</div>

<footer>
    <p># <a href="https://github.com/Sahil2007BD/Simple-Web-Calculator" target="_blank">To GitHub</a> </p>
    <p>&copy;  Simple Web Calculator .  Md Sahil</p>
</footer>

<script src="main.js"></script>
</body>
</html>
